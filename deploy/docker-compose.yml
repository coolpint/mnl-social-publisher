services:
  social-desk:
    image: ${MNL_SOCIAL_IMAGE:-ghcr.io/coolpint/mnl-social-publisher:main}
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: mnl-social-publisher
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PORT:-8420}:8420"
    env_file:
      - ./mnl-social-publisher.env
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8420/healthz', timeout=5).read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
