name: mnl-social-publisher-remote-ops

on:
  workflow_dispatch:
    inputs:
      operation:
        description: "What should this run do?"
        required: true
        type: choice
        default: build_review_all
        options:
          - list_batches
          - build_review_all
          - queue_publish_requests
      relative_dir:
        description: "Optional relative_dir like 2026/03/22/run-000321. Leave blank to use the latest batch."
        required: false
        type: string
      platform:
        description: "Required when queueing publish requests."
        required: false
        type: choice
        default: threads
        options:
          - youtube_shorts
          - threads
          - x
          - facebook
          - instagram

jobs:
  remote_ops:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      MNL_SOCIAL_STORAGE_BACKEND: onedrive
      MNL_SOCIAL_INBOX_REMOTE_ROOT: social/inbox
      MNL_SOCIAL_REVIEW_REMOTE_ROOT: social/review
      MNL_SOCIAL_APPROVAL_REMOTE_ROOT: social/approval
      MNL_SOCIAL_OUTBOX_REMOTE_ROOT: social/outbox
      MNL_SOCIAL_STATUS_REMOTE_ROOT: social/status
      MNL_ONEDRIVE_TENANT_ID: ${{ secrets.MNL_ONEDRIVE_TENANT_ID }}
      MNL_ONEDRIVE_CLIENT_ID: ${{ secrets.MNL_ONEDRIVE_CLIENT_ID }}
      MNL_ONEDRIVE_CLIENT_SECRET: ${{ secrets.MNL_ONEDRIVE_CLIENT_SECRET }}
      MNL_ONEDRIVE_DRIVE_ID: ${{ secrets.MNL_ONEDRIVE_DRIVE_ID }}
      PYTHONPATH: src
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify required OneDrive secrets
        run: |
          python - <<'PY'
          import os
          missing = [
              name for name in (
                  "MNL_ONEDRIVE_TENANT_ID",
                  "MNL_ONEDRIVE_CLIENT_ID",
                  "MNL_ONEDRIVE_CLIENT_SECRET",
                  "MNL_ONEDRIVE_DRIVE_ID",
              )
              if not os.environ.get(name)
          ]
          if missing:
              raise SystemExit(f"Missing required secrets: {', '.join(missing)}")
          PY

      - name: Run remote operation
        id: ops
        shell: bash
        run: |
          set -euo pipefail
          operation="${{ inputs.operation }}"
          relative_dir="${{ inputs.relative_dir }}"
          platform="${{ inputs.platform }}"
          args=()
          if [[ -n "${relative_dir}" ]]; then
            args+=(--relative-dir "${relative_dir}")
          fi

          if [[ "${operation}" == "list_batches" ]]; then
            python -m mnl_social_publisher workspace-list-batches --limit 10 --pretty > result.json
          elif [[ "${operation}" == "build_review_all" ]]; then
            python -m mnl_social_publisher workspace-build-review-all "${args[@]}" --pretty > result.json
          elif [[ "${operation}" == "queue_publish_requests" ]]; then
            python -m mnl_social_publisher workspace-create-publish-requests "${platform}" "${args[@]}" --pretty > result.json
          else
            echo "Unsupported operation: ${operation}" >&2
            exit 1
          fi

      - name: Upload operation result
        uses: actions/upload-artifact@v4
        with:
          name: mnl-social-publisher-${{ github.run_id }}
          path: result.json
          retention-days: 14

      - name: Write summary
        run: |
          {
            echo "## Social Publisher Remote Ops"
            echo
            echo "- Operation: \`${{ inputs.operation }}\`"
            if [[ -n "${{ inputs.relative_dir }}" ]]; then
              echo "- Requested relative_dir: \`${{ inputs.relative_dir }}\`"
            else
              echo "- Requested relative_dir: \`latest available batch\`"
            fi
            echo "- Platform: \`${{ inputs.platform }}\`"
            echo "- Remote inbox root: \`social/inbox\`"
            echo "- Remote review root: \`social/review\`"
            echo "- Remote outbox root: \`social/outbox\`"
            echo
            echo '```json'
            cat result.json
            echo
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
